  <script>
        // Date
        const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('cert-date-input').value = today;

        // Certificate ID
        const certId = 'WC-' + Date.now().toString(36).toUpperCase().slice(-6) + '-' + Math.random().toString(36).slice(2,5).toUpperCase();
        document.getElementById('cert-id-number').textContent = certId;

        // Animation
        const overlay = document.getElementById('overlay');
        const goldGlow = document.getElementById('gold-glow');
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const envelopeFlap = document.getElementById('envelope-flap');
        const envelopeSeal = document.getElementById('envelope-seal');
        const certSlide = document.getElementById('cert-slide');
        const mainContent = document.getElementById('main-content');

        setTimeout(() => overlay.classList.add('active'), 200);
        setTimeout(() => goldGlow.classList.add('active'), 800);
        setTimeout(() => envelopeWrapper.classList.add('active'), 1500);
        setTimeout(() => { envelopeSeal.classList.add('hidden'); envelopeFlap.classList.add('open'); }, 3200);
        setTimeout(() => certSlide.classList.add('up'), 3800);
        setTimeout(() => { overlay.style.opacity = '0'; overlay.style.transition = 'opacity 1.2s ease'; }, 5000);
        setTimeout(() => { overlay.style.display = 'none'; mainContent.classList.add('active'); burstConfetti(); startSparkles(); }, 6200);

        function burstConfetti() {
            const colors = ['#b8860b', '#d4a843', '#e8d48b', '#f0d860', '#1a2a5e'];
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = (Math.random() * 100) + '%';
                p.style.top = '-10px';
                p.style.width = (4 + Math.random() * 6) + 'px';
                p.style.height = (8 + Math.random() * 12) + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
                p.style.animationDelay = (Math.random() * 0.8) + 's';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 5500);
            }
        }

        function startSparkles() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const s = document.createElement('div');
                    s.className = 'sparkle';
                    s.style.left = (15 + Math.random() * 70) + '%';
                    s.style.top = (20 + Math.random() * 60) + '%';
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 2500);
                }, i * 120);
            }
        }

        function celebrateAgain() {
            burstConfetti();
            startSparkles();
            const msg = document.getElementById('celebration-msg');
            msg.classList.add('active');
            setTimeout(() => msg.classList.remove('active'), 4000);
        }

        function downloadPNG() {
            const cert = document.getElementById('certificate');
            const canvas = document.createElement('canvas');
            canvas.width = cert.offsetWidth * 2;
            canvas.height = cert.offsetHeight * 2;
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);
            ctx.fillStyle = '#fdf8ef';
            ctx.fillRect(0, 0, cert.offsetWidth, cert.offsetHeight);

            img.src = url;
        }
